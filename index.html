<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Dagens checklista</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Checklista">
<meta name="theme-color" content="#1A2F45">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" href="icons/icon-192.png">


<style>
  :root{
    --bg:#F7F5F2;
    --ink:#2D2D2D;
    --gray:#9A9690;
    --line:#E7E2DA;
    --card:#FFFFFF;
    --head:#1A2F45;
    --accent:#3A7CA5;
    --done:#2E8B57;
    --done-bg:#EAFAF1;
    --ghost:#C9C4BC;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{
    margin:0; padding:0; background:var(--bg); color:var(--ink);
    font-family:-apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
    -webkit-font-smoothing:antialiased;
    overflow:hidden; height:100%;
    overscroll-behavior:none;
  }
  body{
    padding-top:env(safe-area-inset-top);
    padding-bottom:env(safe-area-inset-bottom);
    display:flex; flex-direction:column; height:100vh;
  }

  /* date header + dots */
  .topbar{
    padding:18px 20px 10px;
    text-align:center;
    flex:0 0 auto;
  }
  .topbar .label{
    font-size:12px; font-weight:700; letter-spacing:0.06em;
    text-transform:uppercase; color:var(--accent);
    margin-bottom:2px;
  }
  .topbar .label.today{ color:var(--ink); }
  .topbar h1{
    margin:0; font-size:24px; font-weight:800; letter-spacing:-0.01em;
  }
  .dots{
    display:flex; justify-content:center; gap:6px; margin-top:10px;
  }
  .dot{
    width:6px; height:6px; border-radius:50%;
    background:var(--ghost);
    transition:background .2s;
  }
  .dot.active{ background:var(--head); width:18px; border-radius:4px; }

  /* swipe viewport */
  .viewport{
    flex:1 1 auto;
    position:relative;
    overflow:hidden;
  }
  .track{
    display:flex;
    width:300%;
    height:100%;
    transform:translateX(-33.3333%);
    transition:transform .28s cubic-bezier(.32,.72,0,1);
    touch-action:pan-y;
  }
  .pane{
    width:33.3333%;
    height:100%;
    overflow-y:auto;
    -webkit-overflow-scrolling:touch;
    padding:6px 16px 40px;
  }

  .list{ max-width:560px; margin:0 auto; }

  .item{
    display:flex; align-items:center; gap:12px;
    background:var(--card);
    border:1px solid var(--line);
    border-radius:14px;
    padding:13px 14px;
    margin-bottom:9px;
  }
  .item.done{
    background:var(--done-bg);
    border-color:#CFE9DA;
  }
  .check{
    flex:0 0 24px; height:24px; width:24px;
    border-radius:50%;
    border:2px solid var(--ghost);
    display:flex; align-items:center; justify-content:center;
    font-size:13px; color:#fff;
    cursor:pointer;
  }
  .item.done .check{
    background:var(--done); border-color:var(--done);
  }
  .item input.text{
    flex:1; border:none; outline:none; background:transparent;
    font-size:15.5px; color:var(--ink); font-family:inherit;
    padding:4px 0;
  }
  .item.done input.text{
    color:var(--gray);
    text-decoration:line-through;
  }
  .del{
    flex:0 0 auto; border:none; background:none; color:var(--ghost);
    font-size:18px; padding:2px 4px; cursor:pointer;
  }

  .addrow{
    display:flex; align-items:center; gap:12px;
    padding:13px 14px;
    margin-top:4px; margin-bottom:9px;
  }
  .addrow .plus{
    flex:0 0 24px; height:24px; width:24px;
    border-radius:50%; border:2px dashed var(--ghost);
    display:flex; align-items:center; justify-content:center;
    color:var(--ghost); font-size:15px;
  }
  .addrow input{
    flex:1; border:none; outline:none; background:transparent;
    font-size:15.5px; color:var(--ink); font-family:inherit;
  }
  .addrow input::placeholder{ color:var(--ghost); }

  .empty{
    text-align:center; color:var(--gray); font-size:13px;
    margin-top:30px; line-height:1.6;
  }

  .progress{
    text-align:center; font-size:12px; color:var(--gray);
    margin: 2px 0 14px;
  }

  .installhint{
    margin:0 16px 10px; padding:10px 36px 10px 13px;
    background:var(--card); border:1px dashed var(--line);
    border-radius:12px; font-size:11.5px; color:var(--gray);
    display:none; flex:0 0 auto; text-align:center;
    position:relative;
  }
  .installhint.show{ display:block; }
  .installhint b{ color:var(--ink); }
  .installhint-close{
    position:absolute; top:6px; right:8px;
    border:none; background:none; color:var(--ghost);
    font-size:16px; line-height:1; padding:4px 6px; cursor:pointer;
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="label" id="dayLabel">IDAG</div>
  <h1 id="dateHeading">—</h1>
  <div class="dots">
    <div class="dot" id="dotY"></div>
    <div class="dot active" id="dotT"></div>
    <div class="dot" id="dotM"></div>
  </div>
</div>

<div class="installhint" id="installHint">
  <button class="installhint-close" id="installHintClose" aria-label="Stäng">×</button>
  <span>Lägg till på hemskärmen: <b>Dela</b> ⬆️ i Safari → <b>"Lägg till på hemskärmen"</b></span>
</div>

<div class="viewport">
  <div class="track" id="track">
    <div class="pane" id="paneY"></div>
    <div class="pane" id="paneT"></div>
    <div class="pane" id="paneM"></div>
  </div>
</div>

<script>
const STORE_KEY = 'dagens_checklista_v1';

function fmtKey(d){
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function addDays(d, n){
  const r = new Date(d); r.setDate(r.getDate()+n); return r;
}
const SV_DAYS = ['Söndag','Måndag','Tisdag','Onsdag','Torsdag','Fredag','Lördag'];
const SV_MONTHS = ['januari','februari','mars','april','maj','juni','juli','augusti','september','oktober','november','december'];

function fmtHeading(d){
  return `${SV_DAYS[d.getDay()]} ${d.getDate()} ${SV_MONTHS[d.getMonth()]}`;
}

let store = {};
try{
  const raw = localStorage.getItem(STORE_KEY);
  if(raw) store = JSON.parse(raw);
}catch(e){ store = {}; }

function save(){
  localStorage.setItem(STORE_KEY, JSON.stringify(store));
}

// Ta bort allt som är äldre än igår — appen ska aldrig kunna visa
// längre tillbaka än igår, så det finns ingen anledning att spara det.
function cleanupOldDays(){
  const today = new Date();
  today.setHours(0,0,0,0);
  const oldestAllowed = addDays(today, -1); // igår
  let changed = false;
  Object.keys(store).forEach(key => {
    const d = new Date(key + 'T00:00:00');
    if(d < oldestAllowed){
      delete store[key];
      changed = true;
    }
  });
  if(changed) save();
}
cleanupOldDays();

function getItems(key){
  if(!store[key]) store[key] = [];
  return store[key];
}

function uid(){ return Math.random().toString(36).slice(2,9); }

// state: center date = today, fixed. Offsets -1,0,1 mapped to panes Y/T/M
let centerDate = new Date();
centerDate.setHours(0,0,0,0);

const panes = {
  Y: document.getElementById('paneY'),
  T: document.getElementById('paneT'),
  M: document.getElementById('paneM'),
};

function renderPane(pane, key, isToday){
  pane.innerHTML = '';
  const list = document.createElement('div');
  list.className = 'list';

  const items = getItems(key);
  const doneCount = items.filter(i=>i.done).length;

  if(items.length === 0){
    // still show add row
  } else {
    const prog = document.createElement('div');
    prog.className = 'progress';
    prog.textContent = `${doneCount} av ${items.length} klara`;
    list.appendChild(prog);
  }

  items.forEach(item => {
    const row = document.createElement('div');
    row.className = 'item' + (item.done ? ' done' : '');

    const check = document.createElement('div');
    check.className = 'check';
    check.textContent = item.done ? '✓' : '';
    check.addEventListener('click', () => {
      item.done = !item.done;
      save();
      renderPane(pane, key, isToday);
    });

    const text = document.createElement('input');
    text.className = 'text';
    text.type = 'text';
    text.value = item.text;
    text.addEventListener('input', e => {
      item.text = e.target.value;
      save();
    });
    text.addEventListener('blur', () => {
      if(!item.text.trim()){
        const idx = items.indexOf(item);
        if(idx > -1) items.splice(idx,1);
        save();
        renderPane(pane, key, isToday);
      }
    });

    const del = document.createElement('button');
    del.className = 'del';
    del.textContent = '×';
    del.addEventListener('click', () => {
      const idx = items.indexOf(item);
      if(idx > -1) items.splice(idx,1);
      save();
      renderPane(pane, key, isToday);
    });

    row.appendChild(check);
    row.appendChild(text);
    row.appendChild(del);
    list.appendChild(row);
  });

  // add row
  const addRow = document.createElement('div');
  addRow.className = 'addrow';
  const plus = document.createElement('div');
  plus.className = 'plus';
  plus.textContent = '+';
  const input = document.createElement('input');
  input.placeholder = 'Lägg till...';
  input.addEventListener('keydown', e => {
    if(e.key === 'Enter' && input.value.trim()){
      items.push({ id: uid(), text: input.value.trim(), done:false });
      save();
      input.value='';
      renderPane(pane, key, isToday);
      // refocus new add input
      setTimeout(()=>{
        const p = pane.querySelector('.addrow input');
        if(p) p.focus();
      }, 30);
    }
  });
  addRow.appendChild(plus);
  addRow.appendChild(input);
  list.appendChild(addRow);

  if(items.length === 0){
    const empty = document.createElement('div');
    empty.className = 'empty';
    empty.textContent = isToday ? 'Inget inplanerat ännu — lägg till något ovan' : 'Inget inplanerat den här dagen';
    list.insertBefore(empty, list.firstChild);
  }

  pane.appendChild(list);
}

function renderAll(){
  const yDate = addDays(centerDate, -1);
  const tDate = centerDate;
  const mDate = addDays(centerDate, 1);

  renderPane(panes.Y, fmtKey(yDate), false);
  renderPane(panes.T, fmtKey(tDate), true);
  renderPane(panes.M, fmtKey(mDate), false);

  updateHeader();
}

// paneIndex: 0 = igår, 1 = idag, 2 = imorgon
let paneIndex = 1;

function updateHeader(){
  const dateForIndex = [addDays(centerDate,-1), centerDate, addDays(centerDate,1)][paneIndex];
  const labelForIndex = ['IGÅR','IDAG','IMORGON'][paneIndex];

  document.getElementById('dateHeading').textContent = fmtHeading(dateForIndex);
  document.getElementById('dayLabel').textContent = labelForIndex;
  document.getElementById('dayLabel').className = 'label' + (paneIndex===1 ? ' today' : '');

  document.getElementById('dotY').className = 'dot' + (paneIndex===0 ? ' active' : '');
  document.getElementById('dotT').className = 'dot' + (paneIndex===1 ? ' active' : '');
  document.getElementById('dotM').className = 'dot' + (paneIndex===2 ? ' active' : '');
}

renderAll();

if(!window.navigator.standalone && !localStorage.getItem('installHintDismissed')){
  document.getElementById('installHint').classList.add('show');
}
document.getElementById('installHintClose').addEventListener('click', () => {
  document.getElementById('installHint').classList.remove('show');
  localStorage.setItem('installHintDismissed', '1');
});

// ---- swipe handling: 3 fixed panes (igår/idag/imorgon), can't go further ----
const track = document.getElementById('track');
const viewport = document.querySelector('.viewport');
let startX = 0, startY = 0, dx = 0, dragging = false, lockedAxis = null;
let vw = viewport.clientWidth;

window.addEventListener('resize', () => { vw = viewport.clientWidth; });

function setTransform(px, animate){
  track.style.transition = animate ? 'transform .28s cubic-bezier(.32,.72,0,1)' : 'none';
  track.style.transform = `translateX(${px}px)`;
}

// translateX needed to show pane at given index (0,1,2)
function pxForIndex(i){ return -vw * i; }

setTransform(pxForIndex(paneIndex), false);

function onStart(x,y){
  dragging = true; lockedAxis = null;
  startX = x; startY = y; dx = 0;
  setTransform(pxForIndex(paneIndex), false);
}
function onMove(x,y){
  if(!dragging) return;
  const ddx = x - startX;
  const ddy = y - startY;
  if(lockedAxis === null){
    if(Math.abs(ddx) > 6 || Math.abs(ddy) > 6){
      lockedAxis = Math.abs(ddx) > Math.abs(ddy) ? 'x' : 'y';
    }
  }
  if(lockedAxis === 'x'){
    // clamp drag so you can't drag past the first/last pane
    let proposed = ddx;
    if(paneIndex === 0) proposed = Math.min(proposed, 0);     // already at igår, can't drag further right
    if(paneIndex === 2) proposed = Math.max(proposed, 0);     // already at imorgon, can't drag further left
    dx = proposed;
    setTransform(pxForIndex(paneIndex) + dx, false);
  }
}
function onEnd(){
  if(!dragging) return;
  dragging = false;
  if(lockedAxis === 'x'){
    const threshold = vw * 0.22;
    if(dx > threshold && paneIndex > 0){
      goToPane(paneIndex - 1);
    } else if(dx < -threshold && paneIndex < 2){
      goToPane(paneIndex + 1);
    } else {
      animateTo(pxForIndex(paneIndex));
    }
  }
  lockedAxis = null; dx = 0;
}

function animateTo(px, cb){
  setTransform(px, true);
  const onEndTrans = () => {
    track.removeEventListener('transitionend', onEndTrans);
    if(cb) cb();
  };
  track.addEventListener('transitionend', onEndTrans);
}

function goToPane(newIndex){
  paneIndex = newIndex;
  updateHeader();
  animateTo(pxForIndex(paneIndex));
}

// touch events
viewport.addEventListener('touchstart', e => {
  const t = e.touches[0];
  onStart(t.clientX, t.clientY);
}, {passive:true});
viewport.addEventListener('touchmove', e => {
  const t = e.touches[0];
  onMove(t.clientX, t.clientY);
  if(lockedAxis === 'x') e.preventDefault();
}, {passive:false});
viewport.addEventListener('touchend', onEnd, {passive:true});

// mouse events (desktop testing)
let mouseDown = false;
viewport.addEventListener('mousedown', e => { mouseDown = true; onStart(e.clientX, e.clientY); });
window.addEventListener('mousemove', e => { if(mouseDown) onMove(e.clientX, e.clientY); });
window.addEventListener('mouseup', () => { if(mouseDown){ mouseDown=false; onEnd(); } });
</script>

<script>
if('serviceWorker' in navigator){
  let refreshing = false;
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if(refreshing) return;
    refreshing = true;
    window.location.reload();
  });
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
</script>

</body>
</html>
